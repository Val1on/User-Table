<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comprehensive User Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-50 min-h-screen font-sans antialiased">
    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
      <div class="mb-8 flex items-center justify-between pb-4">
        <div>
          <h1
            class="text-2xl sm:text-3xl font-bold text-slate-900 tracking-tight"
          >
            User Management
          </h1>
        </div>
      </div>

      <div
        class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full border-collapse text-left table-auto">
            <thead>
              <tr
                class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider"
              >
                <th class="px-6 py-4 w-12">ID</th>
                <th class="px-6 py-4">Basic Info</th>
                <th class="px-6 py-4">Address</th>
                <th class="px-6 py-4">Phone & Web</th>
                <th class="px-6 py-4">Company</th>
                <th class="px-6 py-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody
              id="userTableBody"
              class="divide-y divide-slate-100 text-sm text-slate-600"
            ></tbody>
          </table>
        </div>
      </div>
    </div>

    <div
      id="editModal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto"
    >
      <div
        class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"
        onclick="cancelEdit()"
      ></div>

      <div
        class="relative bg-white w-full max-w-2xl rounded-2xl p-6 shadow-xl border border-slate-100 my-auto transform transition-all max-h-[90vh] flex flex-col"
      >
        <div
          class="flex items-center justify-between pb-4 border-b border-slate-100 shrink-0"
        >
          <div class="flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-indigo-600"></span>
            <h4 class="text-lg font-semibold text-slate-900">
              Edit Complete User Profile
            </h4>
          </div>
          <button
            onclick="cancelEdit()"
            class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-50 transition cursor-pointer"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <div class="space-y-6 py-4 overflow-y-auto grow pr-1 text-sm">
          <input type="hidden" id="editId" />

          <div>
            <h5
              class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-3"
            >
              Core Credentials
            </h5>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Full Name</label
                >
                <input
                  type="text"
                  id="editName"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Username</label
                >
                <input
                  type="text"
                  id="editUsername"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Email Address</label
                >
                <input
                  type="email"
                  id="editEmail"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
            </div>
          </div>

          <div class="border-t border-slate-100 pt-4">
            <h5
              class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-3"
            >
              Location Details
            </h5>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Street</label
                >
                <input
                  type="text"
                  id="editStreet"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Suite / Apt</label
                >
                <input
                  type="text"
                  id="editSuite"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div class="md:col-span-2">
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >City</label
                >
                <input
                  type="text"
                  id="editCity"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Zipcode</label
                >
                <input
                  type="text"
                  id="editZipcode"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Geo (Lat/Lng)</label
                >
                <div class="flex gap-1">
                  <input
                    type="text"
                    id="editLat"
                    placeholder="Lat"
                    class="w-1/2 px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs text-center"
                  />
                  <input
                    type="text"
                    id="editLng"
                    placeholder="Lng"
                    class="w-1/2 px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs text-center"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="border-t border-slate-100 pt-4">
            <h5
              class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-3"
            >
              Communication & Professional Context
            </h5>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Phone Number</label
                >
                <input
                  type="text"
                  id="editPhone"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Website</label
                >
                <input
                  type="text"
                  id="editWebsite"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Company Name</label
                >
                <input
                  type="text"
                  id="editCompanyName"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1"
                  >Catch Phrase</label
                >
                <input
                  type="text"
                  id="editCompanyCatch"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 text-sm"
                />
              </div>
            </div>
          </div>
        </div>

        <div
          class="mt-4 pt-4 border-t border-slate-100 flex gap-3 justify-end shrink-0"
        >
          <button
            class="px-5 py-2.5 bg-slate-100 text-slate-700 font-medium text-sm rounded-xl hover:bg-slate-200 transition"
            onclick="cancelEdit()"
          >
            Cancel
          </button>
          <button
            class="px-5 py-2.5 bg-indigo-600 text-white font-medium text-sm rounded-xl hover:bg-indigo-700 shadow-sm transition"
            onclick="saveEdit()"
          >
            Save Changes
          </button>
        </div>
      </div>
    </div>

    <script>
      const apiUrl = "https://jsonplaceholder.typicode.com/users/";
      let usersArray = [];

      async function fetchUsers() {
        const response = await fetch(apiUrl);
        usersArray = await response.json();
        renderTable();
      }

      function renderTable() {
        const tbody = document.getElementById("userTableBody");
        tbody.innerHTML = "";

        usersArray.forEach((user) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-slate-50/70 transition-colors align-top";

          tr.innerHTML = `
            <td class="px-6 py-4 font-semibold text-slate-400">${user.id}</td>
            <td class="px-6 py-4">
              <div class="font-semibold text-slate-900">${user.name}</div>
              <div class="text-xs text-slate-500">@${user.username}</div>
              <div class="text-xs text-slate-500 mt-0.5">${user.email}</div>
            </td>
            <td class="px-6 py-4 text-xs">
              <div class="text-slate-800">${user.address.street}, ${user.address.suite}</div>
              <div class="text-slate-500">${user.address.city}, ${user.address.zipcode}</div>
              <div class="text-slate-500  mt-0.5">Geo: ${user.address.geo.lat}, ${user.address.geo.lng}</div>
            </td>
            <td class="px-6 py-4 text-xs">
              <div class="text-slate-700 font-medium">${user.phone}</div>
              <a href="http://${user.website}" target="_blank" class="text-indigo-600 hover:underline block mt-0.5">${user.website}</a>
            </td>
            <td class="px-6 py-4 text-xs">
              <div class="font-semibold text-slate-800">${user.company.name}</div>
              <div class="text-slate-400 italic mt-0.5">"${user.company.catchPhrase}"</div>
            </td>
            <td class="px-6 py-4 text-right">
              <div class="inline-flex gap-1.5">
                <button class="px-2.5 py-1.5 bg-amber-50 text-amber-700 text-xs font-semibold rounded-lg hover:bg-amber-100 transition" onclick="editUser(${user.id})">Edit</button>
                <button class="px-2.5 py-1.5 bg-rose-50 text-rose-700 text-xs font-semibold rounded-lg hover:bg-rose-100 transition" onclick="deleteUser(${user.id})">Delete</button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function editUser(id) {
        const user = usersArray.find((u) => u.id === id);
        if (!user) return;

        document.getElementById("editId").value = user.id;
        document.getElementById("editName").value = user.name;
        document.getElementById("editUsername").value = user.username;
        document.getElementById("editEmail").value = user.email;
        document.getElementById("editPhone").value = user.phone;
        document.getElementById("editWebsite").value = user.website;

        document.getElementById("editStreet").value = user.address.street;
        document.getElementById("editSuite").value = user.address.suite;
        document.getElementById("editCity").value = user.address.city;
        document.getElementById("editZipcode").value = user.address.zipcode;
        document.getElementById("editLat").value = user.address.geo.lat;
        document.getElementById("editLng").value = user.address.geo.lng;

        document.getElementById("editCompanyName").value = user.company.name;
        document.getElementById("editCompanyCatch").value =
          user.company.catchPhrase;

        document.getElementById("editModal").classList.remove("hidden");
      }

      function saveEdit() {
        const id = parseInt(document.getElementById("editId").value);
        const index = usersArray.findIndex((u) => u.id === id);

        if (index !== -1) {
          usersArray[index].name = document.getElementById("editName").value;
          usersArray[index].username =
            document.getElementById("editUsername").value;
          usersArray[index].email = document.getElementById("editEmail").value;
          usersArray[index].phone = document.getElementById("editPhone").value;
          usersArray[index].website =
            document.getElementById("editWebsite").value;

          usersArray[index].address.street =
            document.getElementById("editStreet").value;
          usersArray[index].address.suite =
            document.getElementById("editSuite").value;
          usersArray[index].address.city =
            document.getElementById("editCity").value;
          usersArray[index].address.zipcode =
            document.getElementById("editZipcode").value;
          usersArray[index].address.geo.lat =
            document.getElementById("editLat").value;
          usersArray[index].address.geo.lng =
            document.getElementById("editLng").value;

          usersArray[index].company.name =
            document.getElementById("editCompanyName").value;
          usersArray[index].company.catchPhrase =
            document.getElementById("editCompanyCatch").value;

          renderTable();
          cancelEdit();
        }
      }

      function deleteUser(id) {
        usersArray = usersArray.filter((user) => user.id !== id);
        renderTable();
      }

      function cancelEdit() {
        document.getElementById("editModal").classList.add("hidden");
      }

      document.addEventListener("DOMContentLoaded", fetchUsers);
    </script>
  </body>
</html>
